services:
  postgres:
    container_name: mp-postgres-dev
    image: postgres:18-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 60s
      retries: 5
    env_file:
      - ../.env

  redis:
    container_name: mp-redis-dev
    image: redis:8.6-alpine
    volumes:
      - redis_data:/data/
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: mp_postgres_data
  redis_data:
    name: mp_redis_data
