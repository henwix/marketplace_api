services:
  postgres:
    container_name: mp-postgres-dev
    image: postgres:18-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 60s
      retries: 5
    env_file:
      - ../.env

volumes:
  postgres_data:
    name: mp_postgres_data
